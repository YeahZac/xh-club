#============================================================
# 粤商汇 - Nginx 配置文件
# 放置路径: /etc/nginx/sites-available/yueshanghui.conf
# 启用命令: ln -s /etc/nginx/sites-available/yueshanghui.conf /etc/nginx/sites-enabled/
#============================================================

# 上游 NestJS 后端服务
upstream yueshanghui_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP -> HTTPS 重定向 (启用SSL后取消注释)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

# 主服务器配置
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;
    
    # SSL 配置 (启用SSL后取消注释)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    
    # 根目录 - H5 前端静态文件
    root /var/www/yueshanghui/dist-web;
    index index.html;
    
    # 日志配置
    access_log /var/www/yueshanghui/logs/nginx-access.log;
    error_log /var/www/yueshanghui/logs/nginx-error.log;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 客户端上传大小限制 (支持大文件上传)
    client_max_body_size 100M;
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # API 反向代理到 NestJS 后端
    location /api/ {
        proxy_pass http://yueshanghui_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 上传文件访问 (如果文件存储在服务器本地)
    location /uploads/ {
        alias /var/www/yueshanghui/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # H5 前端路由 - 支持 SPA History 模式
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://yueshanghui_backend/api/health;
        access_log off;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
